name = "stock-pwa-bot"
main = "worker.js"
compatibility_date = "2024-09-01"

# Cron triggers — every 3 min during VN market hours (M-F 9:00-14:45 UTC+7)
# UTC equivalent: 02:00-07:45 (UTC+7 - 7h)
# Cron syntax: minute hour dom month dow
[triggers]
crons = [
  # Mỗi 3 phút từ 02:00 → 07:57 UTC, weekdays (~ 9:00-14:57 VN time)
  # Worker scheduled() tự skip nếu ngoài phiên (lunch break, weekend, holiday)
  "*/3 2-7 * * 1-5",
  # EOD digest 14:50 VN (7:50 UTC) — gửi summary cuối phiên + init multi-stage scan
  "50 7 * * 1-5",
  # Multi-stage scan chunks mỗi 1 phút từ 08:00 → 08:59 UTC (~ 15:00-15:59 VN)
  # Process 35 mã/chunk × 41 chunks = full universe (1411 mã) sau ~41 min
  "* 8 * * 1-5"
]

# Notes:
# - VN trading hours: 9:00-11:30, 13:00-14:45 weekdays (UTC+7)
# - UTC equivalent: 02:00-04:30, 06:00-07:45
# - Cron mỗi 3 min × ~5 giờ active = ~100 invocations/day × 22 trading days = ~2200/month
# - Cloudflare free tier: 100K invocations/day — well within limit
# - Worker scheduled() check isVnTradingNow() để skip lunch/holiday/weekend

# Secrets to set via `wrangler secret put`:
#   - BOT_TOKEN (Telegram bot token from @BotFather)
#   - SUPABASE_URL (https://xxx.supabase.co)
#   - SUPABASE_SERVICE_ROLE_KEY (Supabase Settings → API → service_role)
#   - WEBHOOK_SECRET (optional, random string for /cron-test endpoint)

# Deploy:
#   wrangler deploy
#
# Set webhook (1 lần sau deploy):
#   curl -F "url=https://<worker-url>/webhook" \
#        https://api.telegram.org/bot<TOKEN>/setWebhook
