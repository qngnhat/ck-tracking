<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(80,80)" fill="none" stroke="#00d2ff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Candles -->
    <line x1="40" y1="120" x2="40" y2="240"/>
    <rect x="22" y="140" width="36" height="80" fill="#4CAF50" stroke="#4CAF50"/>
    <line x1="110" y1="60" x2="110" y2="200"/>
    <rect x="92" y="80" width="36" height="100" fill="#4CAF50" stroke="#4CAF50"/>
    <line x1="180" y1="100" x2="180" y2="260"/>
    <rect x="162" y="180" width="36" height="60" fill="#ff4444" stroke="#ff4444"/>
    <line x1="250" y1="40" x2="250" y2="180"/>
    <rect x="232" y="50" width="36" height="110" fill="#4CAF50" stroke="#4CAF50"/>
    <line x1="320" y1="20" x2="320" y2="140"/>
    <rect x="302" y="30" width="36" height="90" fill="#4CAF50" stroke="#4CAF50"/>
    <!-- Trend line -->
    <polyline points="40,180 110,120 180,180 250,80 320,50" stroke="#00d2ff" stroke-width="8" fill="none" opacity="0.8"/>
  </g>
  <text x="256" y="420" font-family="-apple-system, Helvetica, sans-serif" font-size="80" font-weight="800" fill="#00d2ff" text-anchor="middle">CP</text>
</svg>
